# Подключение presence-ws за Frappe (один префикс, как для GET /_presence/health).
#
# 1) map для WebSocket — ОДИН РАЗ в http { } (если ещё нет):
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# 2) Вставьте блок ниже в server { } сайта (например devapp.uzcloud.uz),
#    либо:  include /path/to/nginx-location-_presence.conf;
#
# 3) Не держите отдельно location /_presence/online { ... } — иначе URL вида
#    /_presence/online/... попадут не в тот proxy_pass. HTTP и WSS используют
#    ОДИН location /_presence/ с proxy_pass ...8765/;
#
# 4) Если GET .../_presence/summary отдаёт пусто, а .../health и .../metrics ок —
#    часто другой модуль перехватывает URI с сегментом "summary". Используй тот же
#    JSON на GET .../_presence/overview (или /stats).

location ^~ /_presence/ {
	proxy_pass http://127.0.0.1:8765/;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection $connection_upgrade;
	proxy_read_timeout 86400s;
	proxy_send_timeout 86400s;
}
