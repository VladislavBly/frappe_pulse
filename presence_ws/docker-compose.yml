services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - presence_ws_redis:/data
    command: redis-server --appendonly yes

  presence-ws:
    build: .
    image: presence-ws:local
    ports:
      - "${PRESENCE_WS_PORT:-8765}:8765"
    environment:
      PORT: "8765"
      HOST: "0.0.0.0"
      REDIS_URL: redis://redis:6379
      PRESENCE_TENANT: "${PRESENCE_TENANT:-default}"
      PRESENCE_SERVICE_ID: "${PRESENCE_SERVICE_ID:-presence-ws}"
      # Frappe session verify before WebSocket upgrade (same secret as site_config pulse_presence_auth_secret):
      # FRAPPE_PRESENCE_VERIFY_URL: "http://host.docker.internal:8000/api/pulse/internal/presence-ws-upgrade-verify"
      # FRAPPE_PRESENCE_VERIFY_SECRET: "${PULSE_PRESENCE_AUTH_SECRET:-}"
      # Optional: HTTP admin kick (POST /admin/kick, /admin/kick-all — header X-Admin-Token)
      # ADMIN_TOKEN: "long-random-secret"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  presence_ws_redis:
